<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.stripe.com/v3/"></script>
    <script src="app.js" defer></script>
</head>
<body class="dark-mode">
    <div class="checkout-container">
        <h2>Checkout</h2>
        <!-- The critical form tag starts here -->
        <form id="payment-form">
            <select id="product-select" style="margin-bottom: 15px; padding: 10px; width: 100%; border-radius: 5px; background: #333; color: white; border: 1px solid #555;">
                <option value="course_basic">Basic Reading — $65.00</option>
                <option value="course_premium">Premium Reading — $111.00</option>
                <option value="couples_reading">Couples Reading — $222.00</option>
                <option value="donation">Donation (Pay what you want)</option>
            </select>
            
            <input type="number" id="custom-amount" placeholder="Enter amount (e.g. 15)" style="display: none; margin-bottom: 15px; padding: 10px; width: 100%; border-radius: 5px; background: #333; color: white; border: 1px solid #555;" />
            
            <div id="payment-element"></div>
            
            <button id="submit-btn" type="submit" style="margin-top: 20px; padding: 10px; width: 100%;">Pay now</button>
        </form>
        <!-- The form tag ends here -->
    </div>
</body>
</html>
